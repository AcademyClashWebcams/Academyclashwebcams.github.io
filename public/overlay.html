<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Academy Clash &#8211; Overlay</title>
  <link rel="stylesheet" href="overlay.css" />
  <!-- Okamžitě přidá obs-mode třídu ještě před vykreslením DOM -->
  <script>if(new URLSearchParams(location.search).get('obs')==='1')document.documentElement.classList.add('obs-mode');</script>
</head>
<body>
<div class="scene" id="scene">

  <div class="bg-gradient"></div>
  <div class="vignette"></div>

  <div class="content">

    <!-- LOGO -->
    <div class="logo">
      <div class="logo-academy">Academy Clash</div>
      <img class="logo-img" src="navico.png" alt="Academy Clash" />
    </div>

    <!-- KAMERY -->
    <div class="cams-row">

      <!-- Koment&#225;tor 1 -->
      <div class="cam-slot">
        <div class="cam-frame">
          <div class="cam-inner">
            <video id="cam-video-1" autoplay playsinline muted></video>
            <div class="cam-placeholder" id="placeholder-1">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M15 10l4.553-2.276A1 1 0 0121 8.723v6.554a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
              </svg>
              <span>CAM FEED</span>
            </div>
          </div>
        </div>
        <div class="cam-name">
          <div class="cam-name-text">Daniel <span style="color:#e8197d">&quot;Dndskid&quot;</span> Hor&#225;&#269;ek</div>
        </div>
      </div>

      <!-- Koment&#225;tor 2 -->
      <div class="cam-slot">
        <div class="cam-frame">
          <div class="cam-inner">
            <video id="cam-video-2" autoplay playsinline muted></video>
            <div class="cam-placeholder" id="placeholder-2">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M15 10l4.553-2.276A1 1 0 0121 8.723v6.554a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
              </svg>
              <span>CAM FEED</span>
            </div>
          </div>
        </div>
        <div class="cam-name">
          <div class="cam-name-text">Adam <span style="color:#e8197d">&quot;Brozovec&quot;</span> Bro&#382;</div>
        </div>
      </div>

    </div>
  </div>

</div>

<!-- VIEWER CONTROLS (skryto v OBS m&#243;du) -->
<div id="viewer-bar">
  <span class="bar-label">Viewer</span>
  <button onclick="swapCams()">&#x21C4; Prohodit kamery</button>
</div>

<!-- GEAR BUTTON -->
<button id="gear-btn" onclick="toggleColorPanel()" title="Nastaven&#237; barev">&#9881;</button>

<!-- COLOR PANEL -->
<div id="color-panel">

  <!-- Kamera 1 -->
  <div class="cp-cam-title">
    CAM 1 &ndash; Dndskid
    <button onclick="resetCam(1)">Reset</button>
  </div>
  <div class="cp-row">
    <span class="cp-lbl">Jas</span>
    <input type="range" id="c1-brightness" min="50" max="200" value="100" step="1" oninput="updateFilter(1)">
    <span class="cp-val" id="c1-brightness-val">100%</span>
  </div>
  <div class="cp-row">
    <span class="cp-lbl">Kontrast</span>
    <input type="range" id="c1-contrast" min="50" max="200" value="100" step="1" oninput="updateFilter(1)">
    <span class="cp-val" id="c1-contrast-val">100%</span>
  </div>
  <div class="cp-row">
    <span class="cp-lbl">Saturace</span>
    <input type="range" id="c1-saturate" min="0" max="300" value="100" step="1" oninput="updateFilter(1)">
    <span class="cp-val" id="c1-saturate-val">100%</span>
  </div>
  <div class="cp-row">
    <span class="cp-lbl">Odst&#237;n</span>
    <input type="range" id="c1-hue" min="-180" max="180" value="0" step="1" oninput="updateFilter(1)">
    <span class="cp-val" id="c1-hue-val">0&deg;</span>
  </div>
  <div class="cp-mirror-row">
    <span>Zrcadlit</span>
    <label class="cp-toggle">
      <input type="checkbox" id="c1-mirror" checked onchange="updateFilter(1)">
      <span class="cp-toggle-slider"></span>
    </label>
  </div>

  <div class="cp-divider"></div>

  <!-- Kamera 2 -->
  <div class="cp-cam-title">
    CAM 2 &ndash; Brozovec
    <button onclick="resetCam(2)">Reset</button>
  </div>
  <div class="cp-row">
    <span class="cp-lbl">Jas</span>
    <input type="range" id="c2-brightness" min="50" max="200" value="100" step="1" oninput="updateFilter(2)">
    <span class="cp-val" id="c2-brightness-val">100%</span>
  </div>
  <div class="cp-row">
    <span class="cp-lbl">Kontrast</span>
    <input type="range" id="c2-contrast" min="50" max="200" value="100" step="1" oninput="updateFilter(2)">
    <span class="cp-val" id="c2-contrast-val">100%</span>
  </div>
  <div class="cp-row">
    <span class="cp-lbl">Saturace</span>
    <input type="range" id="c2-saturate" min="0" max="300" value="100" step="1" oninput="updateFilter(2)">
    <span class="cp-val" id="c2-saturate-val">100%</span>
  </div>
  <div class="cp-row">
    <span class="cp-lbl">Odst&#237;n</span>
    <input type="range" id="c2-hue" min="-180" max="180" value="0" step="1" oninput="updateFilter(2)">
    <span class="cp-val" id="c2-hue-val">0&deg;</span>
  </div>
  <div class="cp-mirror-row">
    <span>Zrcadlit</span>
    <label class="cp-toggle">
      <input type="checkbox" id="c2-mirror" checked onchange="updateFilter(2)">
      <span class="cp-toggle-slider"></span>
    </label>
  </div>

</div>

<script src="overlay-viewer.js"></script>
</body>
</html>
